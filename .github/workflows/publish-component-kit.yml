name: Publish component-kit

on:
  push:
    tags:
      - 'component-kit-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - run: corepack enable
      - run: corepack prepare pnpm@10.30.1 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @promptframe/component-kit test
      - run: pnpm --filter @promptframe/component-kit lint
      - run: pnpm --filter @promptframe/component-kit build
      - run: npm pack --dry-run --json
        working-directory: packages/component-kit
      - run: npm publish
        working-directory: packages/component-kit
